<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PseudoPy Patch Notes</title>
    <style>
        :root {
            --bg: #0b1418;
            --panel: #12212a;
            --border: #2a4855;
            --text: #edf5f8;
            --muted: #95acb6;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: linear-gradient(160deg, #0b1418, #112229);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .wrap {
            max-width: 860px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
        }

        h1 { margin: 0 0 6px; }
        .muted { color: var(--muted); margin: 0 0 14px; }
        h2 { margin-top: 20px; }
        ul { margin: 8px 0 0 20px; }
        li { margin-bottom: 6px; }

        a { color: #9cd4ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .item {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            background: #0f1b22;
        }

        .badge {
            display: inline-block;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 12px;
            margin-right: 6px;
        }
    </style>
</head>

<body>
    <main class="wrap">
        <h1>PseudoPy Patch Notes</h1>
        <p class="muted">Version history and changes to the PseudoPy project</p>

        <section class="item">
            <span class="badge">Latest</span>
            <a href="./v0.1.2.html">v0.1.2, 3/3/26 - Small Update</a>
        </section>

        <section class="item">
            <a href="./v0.1.1.html">v0.1.1, 3/2/26 - Minor Update</a>
        </section>

    </main>
</body>

</html>
