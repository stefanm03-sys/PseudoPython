<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PseudoPy Patch Notes</title>
    <style>
        :root {
            --bg: #0b1418;
            --panel: #12212a;
            --border: #2a4855;
            --text: #edf5f8;
            --muted: #95acb6;
            --accent: #18c29c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: linear-gradient(160deg, #0b1418, #112229);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .wrap {
            max-width: 860px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
        }

        h1 {
            margin: 0 0 6px;
        }

        .muted {
            color: var(--muted);
            margin: 0 0 16px;
        }

        a {
            color: #9cd4ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .item {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 10px;
            background: #0d1a21;
        }

        .badge {
            display: inline-block;
            background: #18c29c22;
            border: 1px solid #18c29c66;
            color: #aef1df;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px;
            margin-right: 8px;
        }

        .top-links {
            margin-top: 12px;
        }
    </style>
</head>

<body>
    <main class="wrap">
        <h1>PseudoPy Patch Notes</h1>
        <p class="muted">Version history and changes to the PseudoPy project</p>

        <section class="item">
            <span class="badge">Latest</span>
            <a href="./v0.1.2.html">v0.1.2, 3/3/26 - Small Update</a>
        </section>

        <section class="item">
            <a href="./v0.1.1.html">v0.1.1, 3/2/26 - Minor Update</a>
        </section>

    </main>
</body>

</html>
