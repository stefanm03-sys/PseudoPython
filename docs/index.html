<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PseudoPy Online Interpreter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #5c5ebf;
            background-image: linear-gradient(135deg, #5c5ebf 0%, #667eea 100%);
            color: #ddd;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #2e2e2e;
            background-image: radial-gradient(circle at top left, #6b6b6b, #2e2e2e);
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            overflow: hidden;
        }

        .header {
            background: #3a3a3a;
            color: #fff;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
            min-height: 500px;
        }

        .section {
            display: flex;
            flex-direction: column;
        }

        .section h2 {
            color: #ddd;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        textarea {
            flex: 1;
            padding: 15px;
            border: 2px solid #555;
            border-radius: 5px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            transition: border-color 0.3s;
            background: #1e1e1e;
            color: #ffffff;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            flex: 1;
            padding: 12px 25px;
            border: dotted 2px #b12a2a;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .run-btn {
            background: #007acc;
            color: white;
        }

        .run-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .run-btn:active {
            transform: translateY(0);
        }

        .clear-btn {
            background: #c52424;
            color: #ddd;
            border: 1px solid #555;
        }

        .clear-btn:hover {
            background: #e0e0e0;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #output {
            background: #000000;
            background-image: linear-gradient(135deg, #3c355a 0%, #3e56be 100%);
            border: 1px solid #555;
            border-radius: 5px;
            padding: 15px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 200px;
            color: #ddd;
        }

        .output-label {
            color: #ffffff;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .error {
            color: #d32f2f;
        }

        .success {
            color: #388e3c;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🐍 PseudoPy Online</h1>
            <p>.ppy v0 - Code in PseudoPy on web!</p>
        </div>

        <div class="content">
            <div class="section input-section">
                <h2>Code Editor</h2>
                <textarea id="codeInput" placeholder="// Enter your PseudoPy code here...\n// Example:
// state \" Hello World \"\n// var x is 10\n// when x> 5 do\n//     state(x)\n// endpt"></textarea>

                <div class="button-group">
                    <button class="run-btn" onclick="runCode()">▶ Run Code</button>
                    <button class="clear-btn" onclick="clearAll()">Clear</button>
                </div>

                <div class="output-label">PseudoPy Examples:</div>
                <div
                    style="background: #1e1e1e; padding: 10px; border: 2px solid #555; border-radius: 5px; font-size: 0.9em; color: #ddd; white-space: pre; font-family: 'Consolas', 'Courier New', monospace;">
                    var x is 2
                    state(x)
                </div>
            </div>

            <div class="section output-section">
                <h2>Output</h2>
                <div class="output-label">Program output and errors will appear below:</div>
                <div id="output"></div>
            </div>
        </div>
    </div>

    <script async src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <script>
        let pyodide;

        async function initPyodide() {
            pyodide = await loadPyodide();
            console.log("Pyodide loaded successfully");
        }

        // set initial input to fixed example
        function loadExample() {
            document.getElementById('codeInput').value = 'state("Hello World")';
        }

        async function runCode() {
            if (!pyodide) {
                document.getElementById('output').innerHTML = '<span class="error">Loading Python runtime...</span>';
                await initPyodide();
            }

            const code = document.getElementById('codeInput').value;
            const outputDiv = document.getElementById('output');

            if (!code.trim()) {
                outputDiv.innerHTML = '<span class="error">Please enter some code first!</span>';
                return;
            }

            outputDiv.innerHTML = '<div class="loading"><div class="spinner"></div>Running PseudoPy code...</div>';

            try {
                const pythonCode = `
import sys
import io
from contextlib import redirect_stdout, redirect_stderr

buf = io.StringIO()
with redirect_stdout(buf), redirect_stderr(buf):
    try:
        from lexer import tokenize
        from parser import parse
        from interpreter import interpret
        pseudopy_code = """${code.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n')}"""
        tokens = tokenize(pseudopy_code)
        ast = parse(tokens)
        interpret(ast)
    except Exception as e:
        # fallback to python execution if interpreter fails
        try:
            exec("""${code.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n')}""")
        except Exception as py_err:
            print(f"Execution error: {type(py_err).__name__}: {py_err}")

output = buf.getvalue()
if not output:
    output = "(no output)"
print(output)
`;

                const result = await pyodide.runPythonAsync(pythonCode);
                outputDiv.innerHTML = `<span class="success">${result.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>`;
            } catch (error) {
                outputDiv.innerHTML = `<span class="error">JavaScript Error:\n${error.message}</span>`;
                console.error('Full error:', error);
            }
        }

        function clearAll() {
            document.getElementById('codeInput').value = '';
            document.getElementById('output').innerHTML = '';
        }

        // Initialize Pyodide and load example when page loads
        window.addEventListener('load', () => {
            initPyodide();
            loadExample();
        });

        // Allow Ctrl+Enter to run code
        document.getElementById('codeInput').addEventListener('keydown', function (e) {
            if (e.ctrlKey && e.key === 'Enter') {
                runCode();
            }
        });
    </script>
</body>

</html>
